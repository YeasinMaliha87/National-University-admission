                {q: "ম্যালেরিয়া রোগের বাহক কোন মশা?", o: ["এডিস", "অ্যানোফিলিস", "কিউলেক্স", "কোনটিই নয়"], a: 1},
                {q: "ভিটামিন সি এর রাসায়নিক নাম কি?", o: ["রেটিনল", "ক্যালসিফেরল", "অ্যাসকরবিক এসিড", "থায়ামিন"], a: 2}
            ],
            math: [
                {q: "sin 45° এর মান কত?", o: ["1", "1/2", "1/√2", "√3/2"], a: 2},
                {q: "log 1 এর মান কত?", o: ["0", "1", "10", "infinity"], a: 0},
                {q: "বৃত্তের ব্যাস ১০ সেমি হলে ক্ষেত্রফল কত?", o: ["১০০π", "২৫π", "৫০π", "১০π"], a: 1},
                {q: "d/dx (sin x) = ?", o: ["cos x", "-cos x", "tan x", "sec x"], a: 0},
                {q: "সবচেয়ে ছোট মৌলিক সংখ্যা কোনটি?", o: ["১", "২", "৩", "৫"], a: 1},
                {q: "ত্রিভুজের তিন কোণের সমষ্টি কত?", o: ["৯০°", "১৮০°", "২৭০°", "৩৬০°"], a: 1},
                {q: "tan 60° এর মান কত?", o: ["1", "√3", "1/√3", "0"], a: 1},
                {q: "বৃত্তের কেন্দ্রগামী জ্যা-কে কি বলে?", o: ["ব্যাসার্ধ", "পরিধি", "ব্যাস", "স্পর্শক"], a: 2},
                {q: "log 10 এর মান কত?", o: ["0", "1", "10", "e"], a: 1},
                {q: "sin^2 θ + cos^2 θ = ?", o: ["0", "1", "2", "sin 2θ"], a: 1},
                {q: "একটি সমকোণী ত্রিভুজের ভূমি ৩, লম্ব ৪ হলে অতিভুজ কত?", o: ["৫", "৬", "৭", "২৫"], a: 0},
                {q: "∫ dx = ?", o: ["x + c", "1 + c", "0", "x^2/2"], a: 0},
                {q: "বর্গের ক্ষেত্রফল ১৬ বর্গ সেমি হলে বাহুর দৈর্ঘ্য কত?", o: ["২", "৪", "৮", "৬"], a: 1},
                {q: "log a (a) = ?", o: ["0", "1", "a", "log a"], a: 1},
                {q: "সরলরেখার সমীকরণ কোনটি?", o: ["y = mx + c", "y = ax^2", "x^2 + y^2 = r^2", "xy = c"], a: 0},
                {q: "π (পাই) এর মান কত?", o: ["৩.১৪১৬", "৩.১৪", "৩.১৫", "৩.১৬"], a: 0},
                {q: "আয়তক্ষেত্রের ক্ষেত্রফল =", o: ["দৈর্ঘ্য + প্রস্থ", "দৈর্ঘ্য * প্রস্থ", "২(দৈর্ঘ্য + প্রস্থ)", "কোনটিই নয়"], a: 1},
                {q: "i^2 এর মান কত?", o: ["1", "0", "-1", "i"], a: 2},
                {q: "সমবাহু ত্রিভুজের প্রত্যেকটি কোণ কত ডিগ্রি?", o: ["৪৫°", "৬০°", "৯০°", "১০০°"], a: 1},
                {q: "log 100 = ?", o: ["1", "2", "3", "10"], a: 1}
            ]
        };

        // Automatic generation of remaining questions for each subject to reach 50 per subject
        Object.keys(mcqData).forEach(subj => {
            const currentList = mcqData[subj];
            const originalLength = currentList.length;
            for(let i = originalLength; i < 50; i++) {
                // Repeating some important patterns to reach 50 per subject
                let base = currentList[i % originalLength];
                currentList.push({
                    q: `[প্র্যাকটিস-${i+1}] ${base.q}`,
                    o: [...base.o],
                    a: base.a
                });
            }
        });

        let currentSubject = 'bangla';
        let currentMode = 'study';
        let score = 0;
        let attempted = 0;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('studyBtn').className = mode === 'study' ? 'px-4 py-1 rounded text-sm font-bold active-tab' : 'px-4 py-1 rounded text-sm font-bold bg-white text-blue-700';
            document.getElementById('examBtn').className = mode === 'exam' ? 'px-4 py-1 rounded text-sm font-bold active-tab' : 'px-4 py-1 rounded text-sm font-bold bg-white text-blue-700';
            document.getElementById('scoreArea').className = mode === 'exam' ? 'bg-yellow-400 text-blue-900 px-4 py-1 rounded-full font-bold text-sm block' : 'hidden';
            resetAll();
        }

        function switchSubject(subj) {
            currentSubject = subj;
            document.querySelectorAll('.subj-tab').forEach(btn => {
                btn.classList.remove('active-tab');
                if(btn.innerText.toLowerCase().includes(subj === 'gk' ? 'জ্ঞান' : subj === 'math' ? 'গণিত' : subj)) {
                    btn.classList.add('active-tab');
                }
            });
            render();
        }

        function render() {
            const container = document.getElementById('quiz-area');
            container.innerHTML = '';
            
            const list = mcqData[currentSubject];
            list.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-gray-100 shadow-sm transition hover:shadow-md animate-fade-in";
                
                let optionsHtml = item.o.map((opt, oIdx) => {
                    let classes = "option-btn w-full text-left p-3 rounded-xl border border-gray-200 mt-2 text-sm md:text-base transition font-medium flex items-center gap-3";
                    if(currentMode === 'study' && oIdx === item.a) classes += " correct";
                    
                    return `
                        <button 
                            onclick="handleChoice(${idx}, ${oIdx}, this)" 
                            class="${classes}" 
                            ${currentMode === 'study' ? 'disabled' : ''}>
                            <span class="w-7 h-7 flex-shrink-0 bg-gray-100 rounded-full flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + oIdx)}</span>
                            <span>${opt}</span>
                        </button>
                    `;
                }).join('');

                card.innerHTML = `
                    <p class="font-bold text-gray-800 mb-3 leading-tight"><span class="text-blue-600 mr-1">Q${idx + 1}.</span> ${item.q}</p>
                    <div class="grid grid-cols-1 gap-1">
                        ${optionsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleChoice(qIdx, sIdx, btn) {
            if(currentMode !== 'exam' || btn.parentElement.dataset.done === 'true') return;
            
            const correctIdx = mcqData[currentSubject][qIdx].a;
            const parent = btn.parentElement;
            const allBtns = parent.querySelectorAll('button');
            
            parent.dataset.done = 'true';
            attempted++;
            
            if(sIdx === correctIdx) {
                score++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                allBtns[correctIdx].classList.add('correct');
            }
            
            document.getElementById('score').innerText = score;
            document.getElementById('totalAttempt').innerText = attempted;
        }

        function resetAll() {
            score = 0;
            attempted = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('totalAttempt').innerText = '0';
            render();
        }

        // Init
        window.onload = render;
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</body>
</html>
